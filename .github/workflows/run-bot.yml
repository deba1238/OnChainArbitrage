name: 🚀 Run Arbitrage Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'কোন মোডে চালাতে চান?'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - real

jobs:
  run-arbitrage:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 কোড ডাউনলোড
        uses: actions/checkout@v3

      - name: ⚙️ Node.js সেটআপ
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 প্যাকেজ ইনস্টল
        run: npm install

      - name: 🟡 টেস্ট মোড (Dry Run)
        if: ${{ github.event.inputs.mode == 'test' }}
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROFIT_RECEIVER_ADDRESS: ${{ secrets.PROFIT_RECEIVER_ADDRESS }}
        run: DRY_RUN=true npm run bot

      - name: 🟢 রিয়েল মোড (আসল ট্রেড)
        if: ${{ github.event.inputs.mode == 'real' }}
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROFIT_RECEIVER_ADDRESS: ${{ secrets.PROFIT_RECEIVER_ADDRESS }}
        run: npm ru
        n bot
