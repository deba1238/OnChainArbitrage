name: 🚀 Run Arbitrage Bot

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test or Real Mode?'
        required: true
        default: 'test'
        type: choice
        options:
          - test
          - real

jobs:
  run-arbitrage:
    runs-on: ubuntu-latest
    steps:
      - name: 📂 Code Download
        uses: actions/checkout@v3

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: 📦 Install Packages
        run: npm install

      - name: 🟡 Test Mode (Dry Run)
        if: ${{ github.event.inputs.mode == 'test' }}
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROFIT_RECEIVER_ADDRESS: ${{ secrets.PROFIT_RECEIVER_ADDRESS }}
        run: DRY_RUN=true npm run bot

      - name: 🟢 Real Mode (Actual Trade)
        if: ${{ github.event.inputs.mode == 'real' }}
        env:
          POLYGON_RPC_URL: ${{ secrets.POLYGON_RPC_URL }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PROFIT_RECEIVER_ADDRESS: ${{ secrets.PROFIT_RECEIVER_ADDRESS }}
        run: npm run bot
